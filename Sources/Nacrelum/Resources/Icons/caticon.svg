
<svg width="75px" height="75px" viewBox="0 0 75 75" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="Group">
            <g id="caticon" transform="translate(10.000000, 5.000000)">
                <!-- Left ear -->
                <rect fill="#FFFFFF" x="0" y="8" width="8" height="8"></rect>
                <rect fill="#FFFFFF" x="8" y="0" width="8" height="8"></rect>
                <rect fill="#FFFFFF" x="8" y="8" width="8" height="8"></rect>
                <!-- Right ear -->
                <rect fill="#FFFFFF" x="48" y="8" width="8" height="8"></rect>
                <rect fill="#FFFFFF" x="40" y="0" width="8" height="8"></rect>
                <rect fill="#FFFFFF" x="40" y="8" width="8" height="8"></rect>
                <!-- Head -->
                <rect fill="#FFFFFF" x="0" y="16" width="56" height="32"></rect>
                <!-- Body -->
                <rect fill="#FFFFFF" x="8" y="48" width="40" height="16"></rect>
                <!-- Eyes (star-shaped cross) -->
                <rect fill="#000000" x="14" y="22" width="4" height="12"></rect>
                <rect fill="#000000" x="10" y="26" width="12" height="4"></rect>
                <rect fill="#000000" x="38" y="22" width="4" height="12"></rect>
                <rect fill="#000000" x="34" y="26" width="12" height="4"></rect>
                <!-- Nose -->
                <rect fill="#000000" x="24" y="36" width="8" height="4"></rect>
            </g>
            <rect id="Rectangle" fill="#D8D8D8" opacity="0" x="0" y="0" width="75" height="75"></rect>
        </g>
    </g>
</svg>
